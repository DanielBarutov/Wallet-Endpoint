services:
  db:
    image: postgres
    container_name: db
    restart: always
    ports:
      - ${DB_PORT}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/${DB_NAME}
    networks:
      - wallet-network
  wallet-endpoint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-endpoint
    restart: always
    ports:
      - 8000:8000
    depends_on:
      - db
    networks:
      - wallet-network

networks:
  wallet-network:
    driver: bridge

volumes:
  db_data:
